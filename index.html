<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Validación - Sanatorio Allende</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#e8f2fb,#dceaf7);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:700px;
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.header{
background:linear-gradient(135deg,#4f8bc5,#2e6ea9);
padding:30px;
text-align:center;
}

.header img{
max-width:320px;
width:100%;
}

.content{
padding:40px;
}

h1{
text-align:center;
color:#18406b;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border:2px solid #d5dce3;
border-radius:12px;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#2e6ea9;
color:white;
transition:.3s;
}

button:hover{
background:#21537f;
}

.ok{
background:#eaf9ee;
border-left:6px solid #28a745;
padding:20px;
margin-top:20px;
border-radius:12px;
}

.er{
background:#fff0f0;
border-left:6px solid #dc3545;
padding:20px;
margin-top:20px;
border-radius:12px;
}

.pdf{
margin-top:15px;
background:#198754;
}

.footer{
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<div class="header">
<img src="LOGO ALLENDE.jpg" alt="Sanatorio Allende">
</div>

<div class="content">

<h1>Portal de Validación</h1>

<p class="sub">
Verificación de atención en Guardia Central
</p>

<input
type="text"
id="dni"
placeholder="Ingrese DNI">

<button onclick="buscar()">
Validar Asistencia
</button>

<div id="resultado"></div>

</div>

<div class="footer">
Sanatorio Allende · Sistema de Validación de Atención
</div>

</div>

<script>

const pacientes = [

{
dni:"44474548",
nombre:"BRISA NATALI VENARUZZO",
fecha:"03/06/2026",
hora:"10:35",
sector:"Guardia Central"
},

{
dni:"42475574",
nombre:"BRENDA ROCÍO LESCANO CHANQUIA",
fecha:"06/06/2026",
hora:"09:24",
sector:"Guardia Central"
}

{
  
dni:"42475574",
nombre:"BRENDA ROCÍO LESCANO CHANQUIA",
fecha:"06/06/2026",
hora:"09:24",
sector:"Guardia Central"
}
  
];


function buscar(){

const dni =
document.getElementById("dni").value.trim();

const paciente =
pacientes.find(
p => p.dni === dni
);

if(paciente){

document.getElementById("resultado").innerHTML = `

<div class="ok">

<h2>✅ ASISTENCIA CONFIRMADA</h2>

<br>

<p><b>Paciente:</b> ${paciente.nombre}</p>

<p><b>DNI:</b> ${paciente.dni}</p>

<p><b>Fecha:</b> ${paciente.fecha}</p>

<p><b>Hora:</b> ${paciente.hora}</p>

<p><b>Sector:</b> ${paciente.sector}</p>

<button
class="pdf"
onclick="descargarPDF(
'${paciente.nombre}',
'${paciente.dni}',
'${paciente.fecha}',
'${paciente.hora}',
'${paciente.sector}'
)">
📄 Descargar Constancia
</button>

</div>

`;

}else{

document.getElementById("resultado").innerHTML = `

<div class="er">
<h2>❌ No se encontraron registros</h2>
</div>

`;

}

}

function descargarPDF(
nombre,
dni,
fecha,
hora,
sector
){

const ventana =
window.open('', '_blank');

ventana.document.write(`

<html>

<head>

<title>Constancia</title>

<style>

body{
font-family:Arial;
padding:40px;
}

h1{
color:#2e6ea9;
}

.caja{
border:1px solid #ccc;
padding:30px;
border-radius:10px;
}

</style>

</head>

<body>

<img src="LOGO ALLENDE.jpg" style="width:250px;margin-bottom:20px;">

<h1>SANATORIO ALLENDE</h1>

<h2>CONSTANCIA DE ATENCIÓN EN GUARDIA CENTRAL</h2>
<p>
La presente acredita la atención registrada en el sistema de validación del Sanatorio Allende.
</p>
<p>
Se deja constancia que:
</p>

<p>
<b>${nombre}</b>
</p>

<p>
DNI: ${dni}
</p>

<p>
Asistió a Guardia Central.
</p>

<p>
Fecha: ${fecha}
</p>

<p>
Hora: ${hora}
</p>

<p>
Código:
VAL-${dni}-${fecha.replaceAll('/','')}
</p>

<br>


</div>

<scr` + `ipt>
window.print();
</scr` + `ipt>

</body>

</html>

`);

}

</script>

</body>
</html>
